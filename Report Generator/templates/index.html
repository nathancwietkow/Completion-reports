<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completion Report Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="email"],
        textarea,
        select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .checkbox-item:hover {
            background-color: #f8f9ff;
            border-color: #667eea;
        }

        .checkbox-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            accent-color: #667eea;
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            cursor: pointer;
        }

        .file-upload {
            border: 2px dashed #ddd;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }

        .file-upload:hover {
            border-color: #667eea;
            background-color: #f0f2ff;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-text {
            color: #666;
            font-size: 14px;
        }

        .file-name {
            color: #667eea;
            font-weight: 500;
            margin-top: 8px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .success-message {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .two-column-checks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .download-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .download-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .two-column-checks {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 25px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Completion Report Generator</h1>
            <p>Create professional completion reports in minutes</p>
        </div>

        <div class="content">
            <div class="success-message" id="successMessage">
                ✓ Report generated successfully! <a href="#" id="downloadLink" class="download-link">Download here</a>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating your report...</p>
            </div>

            <form id="reportForm">
                <!-- Job Details Section -->
                <div class="form-section">
                    <div class="section-title">Job Details</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Project Number *</label>
                            <input type="text" name="projectNumber" required>
                        </div>
                        <div class="form-group">
                            <label>Completion Date *</label>
                            <input type="date" name="completionDate" required>
                        </div>
                    </div>
                    <div class="form-grid full">
                        <div class="form-group">
                            <label>Customer Name *</label>
                            <input type="text" name="customerName" required>
                        </div>
                    </div>
                    <div class="form-grid full">
                        <div class="form-group">
                            <label>Address Line 1 *</label>
                            <input type="text" name="addressLine1" required>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Address Line 2</label>
                            <input type="text" name="addressLine2">
                        </div>
                        <div class="form-group">
                            <label>Address Line 3 / Town</label>
                            <input type="text" name="addressLine3">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Postcode *</label>
                            <input type="text" name="postcode" required>
                        </div>
                    </div>
                </div>

                <!-- Who Did The Work Section -->
                <div class="form-section">
                    <div class="section-title">Who Did The Work?</div>
                    <div class="form-group full">
                        <label>Work Completed By *</label>
                        <select name="workCompletedBy" required id="workCompletedBy">
                            <option value="">-- Choose --</option>
                            <option value="key_environmental">Key Environmental Services</option>
                            <option value="subcontracted">Subcontracted Work</option>
                        </select>
                    </div>
                    <div class="form-group full" id="subcontractorDetails" style="display:none;">
                        <label>Subcontractor Company Name *</label>
                        <input type="text" name="subcontractorName" placeholder="Enter subcontractor company name">
                    </div>
                </div>

                <!-- Project Type Section -->
                <div class="form-section">
                    <div class="section-title">Project Type</div>
                    <div class="form-group full">
                        <label>Select Main Project Type *</label>
                        <select name="majorProject" required id="majorProject">
                            <option value="">-- Choose a project type --</option>
                            <option value="full_reline">Full Tank Reline</option>
                            <option value="bolt_reline">Bolt restoration and lining</option>
                            <option value="steel_reline">Steel restorations and lining</option>
                            <option value="clean_disinfect">Tank clean and disinfections</option>
                            <option value="tank_install">Tank installation</option>
                            <option value="tank_remove">Tank removal</option>
                            <option value="crack_repair">Repairing cracks/patch repairs on fibreglass tanks</option>
                            <option value="dividing_wall">Dividing wall repairs on duplex fibreglass tanks</option>
                            <option value="tanking_floor">Tanking plant room floors</option>
                        </select>
                    </div>
                </div>

                <!-- Remedial Works Section -->
                <div class="form-section">
                    <div class="section-title">Remedial Works (Select if applicable)</div>
                    <div class="checkbox-group two-column-checks">
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="pipework_reroute" id="rw1">
                            <label for="rw1">Pipework rerouting</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="vent_reroute" id="rw2">
                            <label for="rw2">Vent back rerouting</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="pipework_disinfect" id="rw3">
                            <label for="rw3">Pipework disinfections</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="outlet_flush" id="rw4">
                            <label for="rw4">Outlet flushing</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="insulation_wrap" id="rw5">
                            <label for="rw5">Insulation wrapping pipework/tank</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="lid_replace" id="rw6">
                            <label for="rw6">Lid replacement</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="lid_vents" id="rw7">
                            <label for="rw7">Installation of lid vents and/or overflow screens</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="support_replace" id="rw8">
                            <label for="rw8">Hollow support replacements</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="remedialWorks[]" value="fibreglass_repair" id="rw9">
                            <label for="rw9">Fibreglass repair and strengthening</label>
                        </div>
                    </div>
                </div>

                <!-- Work Descriptions Section -->
                <div class="form-section">
                    <div class="section-title">Work Descriptions</div>
                    <div class="form-group full">
                        <label>Project Brief *</label>
                        <textarea name="projectBrief" placeholder="Describe the work undertaken and why it was needed..." required></textarea>
                    </div>
                    <div class="form-group full">
                        <label>BEFORE - Initial Condition *</label>
                        <textarea name="before" placeholder="Describe the condition before work commenced..." required></textarea>
                    </div>
                    <div class="form-group full">
                        <label>PREPARATION - Prep Work *</label>
                        <textarea name="preparation" placeholder="Describe surface preparation and setup work..." required></textarea>
                    </div>
                    <div class="form-group full" id="baseCoatGroup" style="display:none;">
                        <label>BASE COAT - Application</label>
                        <textarea name="baseCoat" placeholder="Describe base coat application..."></textarea>
                    </div>
                    <div class="form-group full" id="topCoatGroup" style="display:none;">
                        <label>TOP COAT - Finishing</label>
                        <textarea name="topCoat" placeholder="Describe top coat application and finishing..."></textarea>
                    </div>
                    <div class="form-group full" id="coatingGroup" style="display:none;">
                        <label>COATING/WORK - Description</label>
                        <textarea name="coating" placeholder="Describe the coating or work performed..."></textarea>
                    </div>
                </div>

                <!-- Certificates Section -->
                <div class="form-section">
                    <div class="section-title">Certificates</div>
                    <div class="form-group full">
                        <label>Include 10-Year Guarantee Certificate?</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="guaranteeYes" name="includeGuarantee" value="true">
                                <label for="guaranteeYes">Yes</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="guaranteeNo" name="includeGuarantee" value="false" checked>
                                <label for="guaranteeNo">No</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group full">
                        <label>Include Disinfection Certificate?</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="disinfectionYes" name="includeDisinfection" value="true">
                                <label for="disinfectionYes">Yes</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="disinfectionNo" name="includeDisinfection" value="false" checked>
                                <label for="disinfectionNo">No</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="button-group">
                    <button type="reset" class="btn-secondary">Clear Form</button>
                    <button type="submit" class="btn-primary">Generate Report</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Show/hide subcontractor details
        document.getElementById('workCompletedBy').addEventListener('change', function(e) {
            const subcontractorDetails = document.getElementById('subcontractorDetails');
            const subcontractorName = document.querySelector('[name="subcontractorName"]');

            if (e.target.value === 'subcontracted') {
                subcontractorDetails.style.display = 'flex';
                subcontractorName.required = true;
            } else {
                subcontractorDetails.style.display = 'none';
                subcontractorName.required = false;
                subcontractorName.value = '';
            }
        });

        // Show/hide relevant sections based on project type and auto-fill descriptions
        document.getElementById('majorProject').addEventListener('change', async function(e) {
            const projectId = e.target.value;
            const fullReline = projectId === 'full_reline';

            document.getElementById('baseCoatGroup').style.display = fullReline ? 'flex' : 'none';
            document.getElementById('topCoatGroup').style.display = fullReline ? 'flex' : 'none';
            document.getElementById('coatingGroup').style.display = fullReline ? 'none' : 'flex';

            // Update required status
            const baseCoat = document.querySelector('[name="baseCoat"]');
            const topCoat = document.querySelector('[name="topCoat"]');
            const coating = document.querySelector('[name="coating"]');

            if (fullReline) {
                baseCoat.required = true;
                topCoat.required = true;
                coating.required = false;
            } else {
                baseCoat.required = false;
                topCoat.required = false;
                coating.required = true;
            }

            // Auto-fill descriptions
            if (projectId) {
                try {
                    const response = await fetch(`/api/get-descriptions/${projectId}`);
                    const data = await response.json();

                    if (data.projectBrief) document.querySelector('[name="projectBrief"]').value = data.projectBrief;
                    if (data.before) document.querySelector('[name="before"]').value = data.before;
                    if (data.preparation) document.querySelector('[name="preparation"]').value = data.preparation;
                    if (data.baseCoat) document.querySelector('[name="baseCoat"]').value = data.baseCoat;
                    if (data.topCoat) document.querySelector('[name="topCoat"]').value = data.topCoat;
                    if (data.coating) document.querySelector('[name="coating"]').value = data.coating;
                } catch (error) {
                    console.log('Could not load descriptions, that\'s okay');
                }
            }
        });

        // Handle form submission
        document.getElementById('reportForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            loading.style.display = 'block';
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            try {
                const formData = new FormData(this);

                const response = await fetch('/api/generate-report', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById('downloadLink').href = `/api/download/${encodeURIComponent(result.filepath)}`;
                    successMessage.style.display = 'block';
                    loading.style.display = 'none';

                    // Scroll to success message
                    successMessage.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error(result.error || 'Unknown error occurred');
                }
            } catch (error) {
                errorMessage.textContent = '❌ Error: ' + error.message;
                errorMessage.style.display = 'block';
                loading.style.display = 'none';
                errorMessage.scrollIntoView({ behavior: 'smooth' });
            }
        });

        // Set today's date as default
        const today = new Date().toISOString().split('T')[0];
        document.querySelector('[name="completionDate"]').value = today;
    </script>
</body>
</html>
